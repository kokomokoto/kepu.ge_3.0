<!DOCTYPE html>
<html lang="ka">
<head>

<body>
    <!-- Header / Navbar -->

                    <i class="bi bi-list"></i>

                <nav id="mainNav">

                    <a href="about.html" data-i18n="nav.about">შესახებ</a>
                    <a href="contact.html" data-i18n="nav.contact">კონტაქტი</a>
                </nav>
            </div>
            <form class="navbar-search navbar-search-center" role="search" onsubmit="return false;">
                <input type="text" id="searchInput" class="form-control form-control-sm" autocomplete="off" data-i18n="search.placeholder" placeholder="ძებნა სათაურით" />

                <div class="lang-switcher btn-group btn-group-sm" role="group" aria-label="Language">
                    <a href="#" class="btn btn-outline-light" data-lang="ka">ქარ</a>
                    <a href="#" class="btn btn-outline-light" data-lang="en">ENG</a>
                    <a href="#" class="btn btn-outline-light" data-lang="ru">РУС</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidepanel for filters -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="filterSidepanel" aria-labelledby="filterSidepanelLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="filterSidepanelLabel" data-i18n="filters">ფილტრები</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="mb-4">
                <h6 class="fw-bold mb-3">ტიპი</h6>
                <div class="col-12">
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="ეკლესია" id="filter_church" data-type="type">
                        <label class="form-check-label" for="filter_church">ეკლესია</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="ციხე" id="filter_fortress" data-type="type">
                        <label class="form-check-label" for="filter_fortress">ციხე</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="მუზეუმი" id="filter_museum" data-type="type">
                        <label class="form-check-label" for="filter_museum">მუზეუმი</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="ძეგლი" id="filter_monument" data-type="type">
                        <label class="form-check-label" for="filter_monument">ძეგლი</label>
                    </div>
                </div>
            </div>
            <div class="mb-4">
                <h6 class="fw-bold mb-3">პერიოდი</h6>
                <div class="col-12">
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="ქრისტეშობამდე" id="filter_bc" data-type="period">
                        <label class="form-check-label" for="filter_bc">ქრისტეშობამდე</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="I-X საუკუნე" id="filter_1_10" data-type="period">
                        <label class="form-check-label" for="filter_1_10">I-X საუკუნე</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="XI-XVII საუკუნე" id="filter_11_17" data-type="period">
                        <label class="form-check-label" for="filter_11_17">XI-XVII საუკუნე</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="1801-1918 წელი" id="filter_1801_1918" data-type="period">
                        <label class="form-check-label" for="filter_1801_1918">1801-1918</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="1918-21 წელი" id="filter_1918_21" data-type="period">
                        <label class="form-check-label" for="filter_1918_21">1918-21</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="1922-53 წელი" id="filter_1922_53" data-type="period">
                        <label class="form-check-label" for="filter_1922_53">1922-53</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="1954-91 წელი" id="filter_1954_91" data-type="period">
                        <label class="form-check-label" for="filter_1954_91">1954-91</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input filter-checkbox" type="checkbox" value="1991 + წელი" id="filter_1991_plus" data-type="period">
                        <label class="form-check-label" for="filter_1991_plus">1991+</label>
                    </div>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-outline-secondary btn-sm" id="clearFilters">
                    ყველა ფილტრის გასუფთავება
                </button>
            </div>
        </div>
    </div>

    <main class="container mb-5">
        <!-- Home 3D Viewer -->
        <div class="container-fluid px-0 mb-4 home-viewer-section">
            <div class="viewer-wrap home-video-wrap">
                <video class="home-hero-video" autoplay muted playsinline loop><source src="https://pub-e596682234f34e708445409c12658970.r2.dev/10)%20tbilisi%20andza/tbilisis%20andza.mp4" type="video/mp4"></video>
            </div>
        </div>

        <!-- Projects Map -->
        <div class="container mb-4">
            <div id="map" style="height: 350px; width: 100%; border-radius: 10px; margin-bottom: 20px;"></div>
        </div>

        <div style="overflow:visible;">
            <div id="projectsContainer" style="display:flex; flex-wrap:wrap; gap:24px;"></div>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            &copy; 2025 Georgian Heritage Portfolio. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/i18n.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="projects_data.js"></script>

    <script>
    var prefetchedViewers = {};
    function prefetchViewer(url) {
        if (!url || url.charAt(0) === '<' || prefetchedViewers[url]) return;
        prefetchedViewers[url] = true;
        var link = document.createElement('link');
        link.rel = 'prefetch';
        link.as = 'document';
        link.href = url;
        document.head.appendChild(link);
    }

    function isPublicProject(project) {
        var v = project.visibility || 'public';
        return v === 'public';
    }

    // ===== RENDER PROJECT CARDS =====
    (function() {
        var container = document.getElementById('projectsContainer');
        projectsData.forEach(function(project) {
            if (!isPublicProject(project)) return;
            var col = document.createElement('div');
            col.className = 'project-card clickable-card';
            col.style.cssText = 'min-width:320px; max-width:340px; flex:0 0 320px; cursor: pointer;';
            col.setAttribute('data-type-categories', project.type_categories ? project.type_categories.join(',') : '');
            col.setAttribute('data-period-categories', project.period_categories ? project.period_categories.join(',') : '');
            col.setAttribute('data-href', 'project.html?id=' + encodeURIComponent(project.id));
            if (project.viewer3D && project.viewer3D.indexOf('http') === 0) {
                col.setAttribute('data-viewer-url', project.viewer3D);
            }

            var title = SiteI18n.localizedField(project, 'title');
            var imgHtml = project.main_image ? '<img src="' + project.main_image + '" class="card-img-top" alt="' + title + '">' : '';
            col.innerHTML = '<div class="card h-100">' + imgHtml + '<div class="card-body"><h5 class="card-title project-card-title" data-project-id="' + project.id + '">' + title + '</h5></div></div>';
            container.appendChild(col);
        });
    })();

    // ===== CLICK HANDLERS =====
    var allProjects = document.querySelectorAll('.project-card');
    allProjects.forEach(function(card) {
        card.addEventListener('mouseenter', function() {
            var viewerUrl = this.getAttribute('data-viewer-url');
            if (viewerUrl) prefetchViewer(viewerUrl);
        });
        card.addEventListener('click', function(e) {
            var href = this.getAttribute('data-href');
            if (href) window.location.href = href;
        });
        card.addEventListener('auxclick', function(e) {
            if (e.button === 1) {
                e.preventDefault();
                var href = this.getAttribute('data-href');
                if (href) window.open(href, '_blank');
            }
        });
    });

    // ===== FILTERS =====
    document.querySelectorAll('.filter-checkbox').forEach(function(cb) { cb.addEventListener('change', applyFilters); });
    document.getElementById('clearFilters').addEventListener('click', function() {
        document.querySelectorAll('.filter-checkbox').forEach(function(cb) { cb.checked = false; });
        applyFilters();
    });
    function projectMatchesSearch(card, q) {
        if (!q) return true;
        var titleEl = card.querySelector('.project-card-title');
        if (!titleEl) return true;
        var pid = titleEl.getAttribute('data-project-id');
        var p = projectsData.find(function(x) { return x.id === pid; });
        if (!p) return true;
        var hay = [p.title, p.title_en, p.title_ru].filter(Boolean).join(' ').toLowerCase();
        return hay.indexOf(q) >= 0;
    }

    function applyFilters() {
        var q = (document.getElementById('searchInput') && document.getElementById('searchInput').value || '').trim().toLowerCase();
        var selectedTypes = Array.from(document.querySelectorAll('.filter-checkbox[data-type="type"]:checked')).map(function(cb) { return cb.value; });
        var selectedPeriods = Array.from(document.querySelectorAll('.filter-checkbox[data-type="period"]:checked')).map(function(cb) { return cb.value; });
        allProjects = document.querySelectorAll('.project-card');
        allProjects.forEach(function(project) {
            var pTypes = project.getAttribute('data-type-categories').split(',').filter(function(t) { return t; });
            var pPeriods = project.getAttribute('data-period-categories').split(',').filter(function(p) { return p; });
            var show = projectMatchesSearch(project, q);
            if (selectedTypes.length > 0) show = show && selectedTypes.some(function(t) { return pTypes.includes(t); });
            if (selectedPeriods.length > 0) show = show && selectedPeriods.some(function(p) { return pPeriods.includes(p); });
            project.style.display = show ? 'block' : 'none';
        });
    }

    var searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.addEventListener('input', applyFilters);

    // ===== MOBILE MENU =====
    var mobileMenuBtn = document.getElementById('mobileMenuBtn');
    var mainNav = document.getElementById('mainNav');
    function checkScreenSize() { if (window.innerWidth > 991) mainNav.classList.remove('mobile-menu-open'); }
    mobileMenuBtn.addEventListener('click', function() { mainNav.classList.toggle('mobile-menu-open'); });
    document.querySelectorAll('#mainNav a').forEach(function(link) {
        link.addEventListener('click', function(e) {
            if (this.getAttribute('href').startsWith('#')) {
                e.preventDefault();
                var el = document.querySelector(this.getAttribute('href'));
                if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
            }
            mainNav.classList.remove('mobile-menu-open');
        });
    });
    checkScreenSize();
    window.addEventListener('resize', checkScreenSize);

    // ===== MAP =====
    document.addEventListener('DOMContentLoaded', function() {
        try {
            var mapDiv = document.getElementById('map');
            if (!mapDiv) return;
            var map = L.map('map').setView([42.0, 43.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            var markers = [];
            projectsData.forEach(function(p) {
                if (!isPublicProject(p)) return;
                if (p.latitude && p.longitude) {
                    var lat = parseFloat(p.latitude), lng = parseFloat(p.longitude);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        var m = L.marker([lat, lng]).addTo(map);
                        m.bindPopup('<div style="max-width:200px;"><h6>' + SiteI18n.localizedField(p, 'title') + '</h6><a href="project.html?id=' + encodeURIComponent(p.id) + '" class="btn btn-sm btn-primary">' + SiteI18n.t('map.view_details') + '</a></div>');
                        markers.push([lat, lng]);
                    }
                }
            });
            if (markers.length > 0) map.fitBounds(markers);
        } catch (e) { console.error('Map error:', e); }
    });
    window.addEventListener('sitelangchange', function() {
        document.querySelectorAll('.project-card-title').forEach(function(el) {
            var id = el.getAttribute('data-project-id');
            var p = projectsData.find(function(x) { return x.id === id; });
            if (p) el.textContent = SiteI18n.localizedField(p, 'title');
        });
    });
    </script>
</body>
</html>
