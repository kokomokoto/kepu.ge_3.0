<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>პროექტი - Georgian Heritage Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
    <link rel="stylesheet" href="static/style.css">
    <style>
        .viewer-wrap{margin-bottom:20px;}
        .loading-container {
            position: relative; width: 100%; background: transparent;
            border-radius: 0; padding: 0; margin-bottom: 20px; text-align: center;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        @media (min-width: 768px) { .loading-container { height: 60vh; min-height: 400px; max-height: 600px; } }
        @media (max-width: 767px) { .loading-container { height: 50vh; min-height: 300px; max-height: 400px; } }
        @media (min-width: 1200px) { .loading-container { height: 65vh; max-height: 700px; } }
        .loading-video { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; z-index: 2;
        }
        .loading-text { font-size: 1.2rem; margin-bottom: 20px; text-align: center; cursor: pointer; }
        .loading-spinner {
            border: 4px solid #ffffff30; border-top: 4px solid #ffffff;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .viewer-stage {
            width: 100%; position: relative; overflow: hidden;
        }
        @media (min-width: 768px) { .viewer-stage { height: 60vh; min-height: 400px; max-height: 600px; } }
        @media (max-width: 767px) { .viewer-stage { height: 50vh; min-height: 300px; max-height: 400px; } }
        @media (min-width: 1200px) { .viewer-stage { height: 65vh; max-height: 700px; } }
        .viewer-stage iframe,
        .viewer-stage .viewer-iframe {
            width: 100% !important; height: 100% !important; max-width: 100% !important;
            border: none; border-radius: 0; box-shadow: none; display: block;
        }
        @media (max-width: 767px) {
            #projectContent { display: flex; flex-direction: column; }
            #infoCol { order: -1; margin-bottom: 30px; }
            #descriptionCol { order: 1; }
            .col-md-8, .col-md-4 { width: 100%; }
            .card { margin-bottom: 20px; }
        }
        .card { border: 1px solid #ddd; border-radius: 8px; }
        .card-header { background-color: #f8f9fa; border-bottom: 1px solid #ddd; padding: 1rem; }
        .card-header h5 { margin: 0; color: #333; }
        .card-body p { margin: 0.5rem 0; line-height: 1.6; }
    </style>
</head>
<body>
    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="container">
            <div class="mobile-header-top">
                <div class="logo">
                    <a href="index.html" class="text-white text-decoration-none">✻</a>
                </div>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="bi bi-list"></i>
                </button>
            </div>
            <nav id="mainNav">
                <a href="index.html" class="active">PROJECTS</a>
                <a href="about.html">ABOUT</a>
                <a href="contact.html">CONTACT</a>
            </nav>
            <div class="d-flex align-items-center gap-1"></div>
        </div>
    </header>

    <main class="container mb-5">
        <div class="container-fluid" id="projectPage">
            <p>იტვირთება...</p>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            &copy; 2025 Georgian Heritage Portfolio. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

    <!-- All 13 production projects loaded from shared data file -->
    <script src="projects_data.js"></script>

    <script>
    // ===== FIND PROJECT BY ID =====
    var urlParams = new URLSearchParams(window.location.search);
    var projectId = urlParams.get('id');
    var project = projectsData.find(function(p) { return p.id === projectId; });

    if (!project) {
        document.getElementById('projectPage').innerHTML = '<div class="text-center py-5"><h2>პროექტი ვერ მოიძებნა</h2><a href="index.html" class="btn btn-primary mt-3">მთავარ გვერდზე</a></div>';
    } else {
        document.title = project.title + ' - Georgian Heritage Portfolio';
        renderProject(project);
    }

    function hasMediaUrl(url) {
        return url && url !== '' && url !== 'None' && url !== 'null';
    }

    function renderProject(p) {
        var html = '';

        // Title
        html += '<h1 class="project-title">' + p.title + '</h1>';

        // 3D Viewer
        if (p.viewer3D) {
            var hasVideo = hasMediaUrl(p.loading_video);
            var hasAudio = hasMediaUrl(p.loading_audio);
            var hasLoadingMedia = hasVideo || hasAudio;

            html += '<div class="viewer-wrap">';

            if (hasLoadingMedia) {
                html += '<div id="loadingContainer" class="loading-container">';
                if (hasVideo) {
                    html += '<video id="loadingVideo" class="loading-video" autoplay muted playsinline><source src="' + p.loading_video + '" type="video/mp4"></video>';
                }
                if (hasAudio) {
                    html += '<audio id="loadingAudio" autoplay muted preload="auto"><source src="' + p.loading_audio + '" type="audio/mpeg"></audio>';
                }
                html += '<div class="loading-overlay">';
                html += '<div class="loading-text" id="loadingText">3D მოდელი იტვირთება...</div>';
                html += '<div class="loading-spinner"></div>';
                html += '<div style="margin-top:15px;font-size:0.9rem;opacity:0.8;" id="loadingStatus">მოდელი იტვირთება...</div>';
                html += '<div style="margin-top:20px;font-size:0.8rem;opacity:0.7;color:#fff;">💡 3D მოდელის ნახვისთვის დააჭირეთ ეკრანზე, ან მოიცადეთ მუსიკის დასრულება</div>';
                html += '</div></div>';
            }

            html += '<div id="viewer3D" class="viewer-stage' + (hasLoadingMedia ? ' hidden' : '') + '">';
            if (p.viewer3D.charAt(0) === '<') {
                html += p.viewer3D;
            } else {
                html += '<iframe src="' + p.viewer3D + '" class="viewer-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="xr-spatial-tracking; gyroscope; accelerometer"></iframe>';
            }
            html += '</div></div>';
        }

        // Map
        if (p.latitude && p.longitude) {
            html += '<h4>ადგილმდებარეობა რუკაზე</h4>';
            html += '<div id="map" style="height:350px; margin-bottom:20px;"></div>';
        }

        // Description + Info
        html += '<div class="row" id="projectContent">';
        html += '<div class="col-md-8" id="descriptionCol"><h4>აღწერა</h4>';
        var desc = p.description || '';
        // Convert \r\n to <br> for proper display
        desc = desc.replace(/\r\n/g, '<br>').replace(/\n/g, '<br>');
        html += '<div class="project-description">' + desc + '</div></div>';

        html += '<div class="col-md-4" id="infoCol"><div class="card"><div class="card-header"><h5>პროექტის ინფორმაცია</h5></div><div class="card-body">';
        if (p.project_info && Object.keys(p.project_info).length > 0) {
            for (var key in p.project_info) {
                if (p.project_info[key]) {
                    html += '<p><strong>' + key + ':</strong> ' + p.project_info[key] + '</p>';
                }
            }
        } else {
            html += '<p class="text-muted">ინფორმაცია არ არის მითითებული</p>';
        }
        html += '</div></div></div></div>';

        // Images
        var hasImages = p.main_image || (p.other_images && p.other_images.length > 0);
        if (hasImages) {
            html += '<h4>სურათები</h4><div class="row">';
            if (p.main_image) {
                var caption = p.main_image_caption || 'მთავარი სურათი';
                html += '<div class="col-md-3 mb-2"><a href="' + p.main_image + '" class="glightbox" data-gallery="gallery1" data-title="' + caption + '"><img src="' + p.main_image + '" class="img-thumbnail" alt="' + caption + '"></a><div class="text-center small text-muted mt-1">' + caption + '</div></div>';
            }
            if (p.other_images) {
                p.other_images.forEach(function(img) {
                    var url = (img && img.url) ? img.url : (typeof img === 'string' ? img : '');
                    var cap = (img && img.caption) ? img.caption : '';
                    if (url) {
                        html += '<div class="col-md-3 mb-2"><a href="' + url + '" class="glightbox" data-gallery="gallery1" data-title="' + cap + '"><img src="' + url + '" class="img-thumbnail" alt="სურათი"></a>';
                        if (cap) html += '<div class="text-center small text-muted mt-1">' + cap + '</div>';
                        html += '</div>';
                    }
                });
            }
            html += '</div>';
        }

        document.getElementById('projectPage').innerHTML = html;

        // Initialize GLightbox
        if (typeof GLightbox !== 'undefined') {
            GLightbox({ selector: '.glightbox' });
        }

        // Initialize 3D viewer loading
        if (p.viewer3D) {
            initViewer();
        }

        // Initialize map
        if (p.latitude && p.longitude) {
            initProjectMap(p);
        }
    }

    function initViewer() {
        var loadingContainer = document.getElementById('loadingContainer');
        var viewer3D = document.getElementById('viewer3D');
        if (!viewer3D) return;
        if (!loadingContainer) return;

        var loadingAudio = document.getElementById('loadingAudio');
        var loadingVideo = document.getElementById('loadingVideo');
        var MAX_WAIT_MS = 120000;
        var mediaStopTimeout = null;
        var mediaAlreadyStopped = false;
        var audioStarted = false;

        function tryStartAudio() {
            if (audioStarted || !loadingAudio) return;
            loadingAudio.muted = false;
            loadingAudio.volume = 1;
            loadingAudio.play().then(function() {
                audioStarted = true;
            }).catch(function() {
                loadingAudio.muted = true;
            });
        }

        function showViewer() {
            if (mediaAlreadyStopped) return;
            mediaAlreadyStopped = true;
            if (mediaStopTimeout) {
                clearTimeout(mediaStopTimeout);
                mediaStopTimeout = null;
            }
            if (loadingAudio) {
                loadingAudio.pause();
                loadingAudio.currentTime = 0;
            }
            if (loadingVideo) {
                loadingVideo.pause();
                loadingVideo.currentTime = 0;
            }
            loadingContainer.style.display = 'none';
            loadingContainer.classList.add('hidden');
            viewer3D.style.display = 'block';
            viewer3D.classList.remove('hidden');
        }

        viewer3D.style.display = 'none';
        loadingContainer.style.cursor = 'pointer';
        loadingContainer.title = '3D მოდელის ნახვისთვის დააჭირეთ';

        loadingContainer.addEventListener('click', function() {
            tryStartAudio();
            setTimeout(showViewer, 100);
        });

        document.addEventListener('click', tryStartAudio, { once: true });
        document.addEventListener('touchstart', tryStartAudio, { once: true });
        setTimeout(tryStartAudio, 100);

        if (loadingVideo) {
            loadingVideo.loop = false;
            loadingVideo.addEventListener('ended', function() {
                if (mediaAlreadyStopped) return;
                if (loadingAudio && !loadingAudio.ended) {
                    loadingVideo.currentTime = 0;
                    loadingVideo.play().catch(function() {});
                } else if (!loadingAudio) {
                    showViewer();
                }
            });
        }

        if (loadingAudio) {
            loadingAudio.loop = false;
            loadingAudio.addEventListener('ended', showViewer);
        }

        mediaStopTimeout = setTimeout(showViewer, MAX_WAIT_MS);
    }

    function initProjectMap(p) {
        try {
            var lat = parseFloat(p.latitude);
            var lng = parseFloat(p.longitude);
            if (isNaN(lat) || isNaN(lng)) return;

            var map = L.map('map').setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup('<b>' + p.title + '</b>').openPopup();
        } catch (e) { console.error('Map error:', e); }
    }

    // ===== MOBILE MENU =====
    var mobileMenuBtn = document.getElementById('mobileMenuBtn');
    var mainNav = document.getElementById('mainNav');
    function checkScreenSize() { if (window.innerWidth > 991) mainNav.classList.remove('mobile-menu-open'); }
    mobileMenuBtn.addEventListener('click', function() { mainNav.classList.toggle('mobile-menu-open'); });
    document.querySelectorAll('#mainNav a').forEach(function(link) {
        link.addEventListener('click', function() { mainNav.classList.remove('mobile-menu-open'); });
    });
    checkScreenSize();
    window.addEventListener('resize', checkScreenSize);
    </script>
</body>
</html>
