    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
    <link rel="stylesheet" href="static/style.css">
    <style>
        .viewer-wrap{margin-bottom:20px;}
        .loading-container {
            position: relative; width: 100%; background: transparent;
            border-radius: 0; padding: 0; margin-bottom: 20px; text-align: center;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        @media (min-width: 768px) { .loading-container { height: 60vh; min-height: 400px; max-height: 600px; } }
        @media (max-width: 767px) { .loading-container { height: 50vh; min-height: 300px; max-height: 400px; } }
        @media (min-width: 1200px) { .loading-container { height: 65vh; max-height: 700px; } }
        .loading-video { width: 100%; height: 100%; object-fit: cover; }
        .loading-fullscreen-btn {
            position: absolute; right: 12px; bottom: 12px; z-index: 100001;
            border: none; border-radius: 8px; width: 48px; height: 48px;
            display: inline-flex; align-items: center; justify-content: center;
            background: rgba(10, 24, 40, 0.78); color: #fff; font-size: 1.25rem;
            cursor: pointer; pointer-events: auto; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .loading-fullscreen-btn:hover { background: rgba(10, 24, 40, 0.9); transform: scale(1.05); }
        .loading-container:fullscreen,
        .loading-container:-webkit-full-screen,
        .loading-container.loading-fs-active {
            width: 100vw; height: 100vh; max-height: none; min-height: 100vh; margin: 0; background: #000;
        }
        .loading-container.loading-fs-active {
            position: fixed !important; inset: 0; z-index: 99999; border-radius: 0;
        }
        .loading-container:fullscreen .loading-video,
        .loading-container:-webkit-full-screen .loading-video,
        .loading-container.loading-fs-active .loading-video { object-fit: contain; }
        .hidden { display: none !important; }
        .viewer-stage {
            width: 100%; position: relative; overflow: hidden;
        }
        @media (min-width: 768px) { .viewer-stage { height: 60vh; min-height: 400px; max-height: 600px; } }
        @media (max-width: 767px) { .viewer-stage { height: 50vh; min-height: 300px; max-height: 400px; } }
        @media (min-width: 1200px) { .viewer-stage { height: 65vh; max-height: 700px; } }
        .viewer-stage iframe,
        .viewer-stage .viewer-iframe {
            width: 100% !important; height: 100% !important; max-width: 100% !important;
            border: none; border-radius: 0; box-shadow: none; display: block;
        }
        .viewer-stage:fullscreen,
        .viewer-stage:-webkit-full-screen,
        .viewer-stage.viewer-fs-active {
            width: 100vw !important;
            height: 100vh !important;
            height: 100dvh !important;
            max-height: none !important;
            min-height: 100vh !important;
            min-height: 100dvh !important;
            margin: 0 !important;
            background: #000;
        }
        .viewer-stage.viewer-fs-active {
            position: fixed !important;
            inset: 0;
            z-index: 99999;
            border-radius: 0;
        }
        .viewer-fullscreen-btn { display: none; z-index: 100002; }
        .viewer-stage:fullscreen .viewer-fullscreen-btn,
        .viewer-stage:-webkit-full-screen .viewer-fullscreen-btn,
        .viewer-stage.viewer-fs-active .viewer-fullscreen-btn,
        .viewer-fullscreen-btn.viewer-exit-floating {
            display: inline-flex !important;
        }
        .viewer-fullscreen-btn.viewer-exit-floating {
            position: fixed !important;
            right: max(14px, env(safe-area-inset-right));
            bottom: max(18px, env(safe-area-inset-bottom));
            width: 56px;
            height: 56px;
            z-index: 2147483000 !important;
            pointer-events: auto !important;
            touch-action: manipulation;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
        }
        html.viewer-fs-lock,
        body.viewer-fs-lock {
            overflow: hidden !important;
            overscroll-behavior: none;
        }

        @media (max-width: 767px) {
            #projectContent { display: flex; flex-direction: column; }
            #infoCol { order: -1; margin-bottom: 30px; }
            #descriptionCol { order: 1; }
            .col-md-8, .col-md-4 { width: 100%; }
            .card { margin-bottom: 20px; }
        }
        .card { border: 1px solid #ddd; border-radius: 8px; }
        .card-header { background-color: #f8f9fa; border-bottom: 1px solid #ddd; padding: 1rem; }
        .card-header h5 { margin: 0; color: #333; }
        .card-body p { margin: 0.5rem 0; line-height: 1.6; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/i18n.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

    <!-- All 13 production projects loaded from shared data file -->
    <script src="projects_data.js"></script>

    <script>
    function hasMediaUrl(url) {
        return url && url !== '' && url !== 'None' && url !== 'null';
    }

    var prefetchedViewers = {};

    function prefetchViewer(url) {
        if (!url || url.charAt(0) === '<' || prefetchedViewers[url]) return;
        prefetchedViewers[url] = true;
        var link = document.createElement('link');
        link.rel = 'prefetch';
        link.as = 'document';
        link.href = url;
        document.head.appendChild(link);
    }

    function renderProject(p) {
        var html = '';
        var title = SiteI18n.localizedField(p, 'title');
        var desc = SiteI18n.localizedField(p, 'description') || '';

        html += '<h1 class="project-title">' + title + '</h1>';


                if (p.viewer3D) {
            var hasVideo = hasMediaUrl(p.loading_video);
            var hasAudio = hasMediaUrl(p.loading_audio);
            var hasLoadingMedia = hasVideo || hasAudio;

            html += '<div class="viewer-wrap">';

            if (hasLoadingMedia) {
                html += '<div id="loadingContainer" class="loading-container">';
                if (hasVideo) {
                    html += '<video id="loadingVideo" class="loading-video" playsinline preload="auto"' +
                        (p.loading_use_video_audio ? ' data-use-video-audio="1"' : '') +
                        '><source src="' + p.loading_video + '" type="video/mp4"></video>';
                    html += '<button type="button" id="loadingFullscreenBtn" class="loading-fullscreen-btn" title="სრული ეკრანი" aria-label="სრული ეკრანი"><i class="bi bi-arrows-fullscreen"></i></button>';
                }
                if (hasAudio) {
                    html += '<audio id="loadingAudio" preload="auto"><source src="' + p.loading_audio + '" type="audio/mpeg"></audio>';
                }
                html += '</div>';
            }

            html += '<div id="viewer3D" class="viewer-stage' + (hasLoadingMedia ? ' hidden' : '') + '"' +
                (hasLoadingMedia ? ' data-viewer-deferred="1"' : '') + '>';
            if (hasLoadingMedia) {
                if (p.viewer3D.charAt(0) === '<') {
                    // HTML embed injected later by initViewer after video is ready
                } else {
                    html += '<iframe id="viewer3dFrame" data-src="' + p.viewer3D + '" class="viewer-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="xr-spatial-tracking; gyroscope; accelerometer"></iframe>';
                }
            } else if (p.viewer3D.charAt(0) === '<') {
                html += p.viewer3D;
            } else {
                html += '<iframe src="' + p.viewer3D + '" class="viewer-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="xr-spatial-tracking; gyroscope; accelerometer"></iframe>';
                prefetchViewer(p.viewer3D);
            }
                        html += '<button type="button" id="viewerFullscreenBtn" class="loading-fullscreen-btn viewer-fullscreen-btn" title="სრული ეკრანიდან გასვლა" aria-label="სრული ეკრანიდან გასვლა"><i class="bi bi-fullscreen-exit"></i></button>';
            html += '</div></div>';
        }

        // Map
        if (p.latitude && p.longitude) {
            html += '<h4>' + SiteI18n.t('project.location') + '</h4>';
            html += '<div id="map" style="height:350px; margin-bottom:20px;"></div>';
        }

        // Description + Info
        html += '<div class="row" id="projectContent">';
        html += '<div class="col-md-8" id="descriptionCol"><h4>' + SiteI18n.t('project.description') + '</h4>';
        desc = desc.replace(/\r\n/g, '<br>').replace(/\n/g, '<br>');
        html += '<div class="project-description">' + desc + '</div></div>';

        html += '<div class="col-md-4" id="infoCol"><div class="card"><div class="card-header"><h5>' + SiteI18n.t('project.info') + '</h5></div><div class="card-body" id="projectInfoBody">';
        var infoItems = SiteI18n.localizedProjectInfo(p);
        if (infoItems && Object.keys(infoItems).length > 0) {
            for (var key in infoItems) {
                if (infoItems[key]) {
                    html += '<p><strong>' + key + ':</strong> ' + infoItems[key] + '</p>';
                }
            }
        } else {
            html += '<p class="text-muted">' + SiteI18n.t('project.info.empty') + '</p>';
        }
        html += '</div></div></div></div>';

        // Images
        var hasImages = p.main_image || (p.other_images && p.other_images.length > 0);
        if (hasImages) {
            html += '<h4>' + SiteI18n.t('project.images') + '</h4><div class="row">';
            if (p.main_image) {
                var caption = p.main_image_caption || SiteI18n.t('project.main_image');
                html += '<div class="col-md-3 mb-2"><a href="' + p.main_image + '" class="glightbox" data-gallery="gallery1" data-title="' + caption + '"><img src="' + p.main_image + '" class="img-thumbnail" alt="' + caption + '"></a><div class="text-center small text-muted mt-1">' + caption + '</div></div>';
            }
            if (p.other_images) {
                p.other_images.forEach(function(img) {
                    var url = (img && img.url) ? img.url : (typeof img === 'string' ? img : '');
                    var cap = (img && img.caption) ? img.caption : '';
                    if (url) {
                        html += '<div class="col-md-3 mb-2"><a href="' + url + '" class="glightbox" data-gallery="gallery1" data-title="' + cap + '"><img src="' + url + '" class="img-thumbnail" alt="' + SiteI18n.t('project.image') + '"></a>';
                        if (cap) html += '<div class="text-center small text-muted mt-1">' + cap + '</div>';
                        html += '</div>';
                    }
                });
            }
            html += '</div>';
        }

        document.getElementById('projectPage').innerHTML = html;

        // Initialize GLightbox
        if (typeof window.projectLightbox !== 'undefined' && window.projectLightbox && typeof window.projectLightbox.destroy === 'function') {
            try { window.projectLightbox.destroy(); } catch (e) {}
        }
        if (typeof GLightbox !== 'undefined') {
            window.projectLightbox = GLightbox({
                selector: '.glightbox',
                touchNavigation: true,
                loop: false,
                draggable: true,
                dragToleranceX: 30,
                dragToleranceY: 80,
                preload: true
            });
        }
        if (!window._projectLightboxOrientationBound) {
            window._projectLightboxOrientationBound = true;
            function refreshProjectLightbox() {
                try {
                    if (window.projectLightbox && typeof window.projectLightbox.reload === 'function') {
                        window.projectLightbox.reload();
                    }
                } catch (err) {}
            }
            window.addEventListener('orientationchange', function() {
                setTimeout(refreshProjectLightbox, 300);
                setTimeout(refreshProjectLightbox, 800);
            });
            window.addEventListener('resize', function() {
                setTimeout(refreshProjectLightbox, 200);
            });
        }

        // Initialize 3D viewer loading
        if (p.viewer3D) {
            initViewer(p);
        }

        // Initialize map
        if (p.latitude && p.longitude) {
            initProjectMap(p);
        }
    }

    function initViewer(projectData) {
        var loadingContainer = document.getElementById('loadingContainer');
        var viewer3D = document.getElementById('viewer3D');
        if (!viewer3D) return;
        if (!loadingContainer) return;

        var loadingAudio = document.getElementById('loadingAudio');
        var loadingVideo = document.getElementById('loadingVideo');
        var useVideoAudio = !!(loadingVideo && loadingVideo.getAttribute('data-use-video-audio') === '1');
        var MAX_WAIT_MS = 120000;
        var mediaStopTimeout = null;
        var mediaAlreadyStopped = false;
        var soundUnmuted = false;
        var viewerLoadStarted = false;
        var videoFullyReady = false;
        var viewerWantsFullscreen = false;
        var userHasGestured = false;
        var autoUnmuteAttempts = 0;
        var AUTO_UNMUTE_MAX = 6;
        var mediaBootStarted = false;
        var mediaBootAt = 0;
        var mediaBootPlaySettled = false;
        var softReloadInProgress = false;

        function ensurePlayingMuted(el) {
            if (!el || mediaAlreadyStopped) return Promise.resolve(false);
            if (!el.paused && !el.ended) return Promise.resolve(true);
            if (!el.muted) el.muted = true;
            return el.play().then(function() {
                return true;
            }).catch(function() {
                return false;
            });
        }

        function tryUnmuteMedia(el) {
            if (!el || mediaAlreadyStopped) return Promise.resolve(false);
            el.volume = 1;
            if (!el.muted && !el.paused) return Promise.resolve(true);

            if (!el.paused) {
                el.muted = false;
                return new Promise(function(resolve) {
                    setTimeout(function() {
                        if (!el.muted && !el.paused) {
                            resolve(true);
                            return;
                        }
                        el.muted = true;
                        if (el.paused) {
                            el.play().then(function() { resolve(false); }).catch(function() { resolve(false); });
                        } else {
                            resolve(false);
                        }
                    }, 80);
                });
            }

            el.muted = false;
            return el.play().then(function() {
                return true;
            }).catch(function() {
                el.muted = true;
                return el.play().then(function() {
                    return false;
                }).catch(function() {
                    return false;
                });
            });
        }

        function tryStartAudio(fromGesture) {
            if (mediaAlreadyStopped || soundUnmuted) return;
            if (!fromGesture && !mediaBootPlaySettled) return;

            if (!fromGesture) {
                if (autoUnmuteAttempts >= AUTO_UNMUTE_MAX) return;
                var readyEl = (useVideoAudio && loadingVideo) ? loadingVideo : loadingAudio;
                if (readyEl && readyEl.readyState < 2) return;
                autoUnmuteAttempts += 1;
            }

            var tasks = [];
            if (loadingAudio) tasks.push(tryUnmuteMedia(loadingAudio));
            if (useVideoAudio && loadingVideo) tasks.push(tryUnmuteMedia(loadingVideo));
            if (!tasks.length) {
                if (loadingVideo && loadingVideo.paused) ensurePlayingMuted(loadingVideo);
                return;
            }
            Promise.all(tasks).then(function(results) {
                if (results.some(Boolean)) {
                    soundUnmuted = true;
                    try { sessionStorage.setItem('kepu_audio_ok', '1'); } catch (err) {}
                }
            });
        }

        function noteUserGesture() {
            userHasGestured = true;
            tryStartAudio(true);
        }

        function markBootPlaySettled() {
            mediaBootPlaySettled = true;
        }

        function sessionAudioOk() {
            try { return sessionStorage.getItem('kepu_audio_ok') === '1'; } catch (err) { return false; }
        }

        function bootLoadingMedia(fromGesture, preferKeepSound) {
            if (mediaBootStarted || mediaAlreadyStopped) return;
            mediaBootStarted = true;
            mediaBootAt = Date.now();
            mediaBootPlaySettled = false;
            if (fromGesture) userHasGestured = true;
            var keepSound = !!(preferKeepSound || fromGesture || sessionAudioOk());

            function afterMutedPlaying() {
                markBootPlaySettled();
                tryStartAudio(!!fromGesture || keepSound);
                [200, 600, 1200, 2500].forEach(function(ms) {
                    setTimeout(function() {
                        if (!soundUnmuted) tryStartAudio(!!fromGesture || keepSound);
                    }, ms);
                });
            }

            function playUnmuted(el, onSuccess) {
                if (!el) return;
                el.volume = 1;
                el.muted = false;
                el.play().then(function() {
                    markBootPlaySettled();
                    if (onSuccess) onSuccess();
                }).catch(function() {
                    if (keepSound) {
                        // Never lock into muted after the site already had sound / gesture.
                        el.muted = false;
                        el.play().then(function() {
                            markBootPlaySettled();
                            if (onSuccess) onSuccess();
                        }).catch(afterMutedPlaying);
                        return;
                    }
                    el.muted = true;
                    el.play().then(afterMutedPlaying).catch(afterMutedPlaying);
                });
            }

            if (loadingVideo) {
                if (useVideoAudio || !loadingAudio) {
                    playUnmuted(loadingVideo, function() {
                        if (useVideoAudio) {
                            soundUnmuted = true;
                            try { sessionStorage.setItem('kepu_audio_ok', '1'); } catch (err) {}
                        }
                        if (loadingAudio) tryStartAudio(!!fromGesture || keepSound);
                    });
                } else {
                    loadingVideo.volume = 1;
                    loadingVideo.muted = true;
                    loadingVideo.play().then(afterMutedPlaying).catch(afterMutedPlaying);
                }
            }

            if (loadingAudio) {
                playUnmuted(loadingAudio, function() {
                    soundUnmuted = true;
                    try { sessionStorage.setItem('kepu_audio_ok', '1'); } catch (err) {}
                });
            }

            if (!loadingVideo && !loadingAudio) markBootPlaySettled();
        }

        function tearDownViewerForSoftReload() {
            viewerLoadStarted = false;
            videoFullyReady = false;
            viewerWantsFullscreen = false;
            var frame = document.getElementById('viewer3dFrame');
            if (frame) {
                try { frame.removeAttribute('src'); } catch (err) {}
            }
            var ready = viewer3D.querySelector('.viewer-embed-ready');
            if (ready) ready.remove();
            viewer3D.classList.remove('viewer-fs-active');
            document.documentElement.classList.remove('viewer-fs-lock');
            document.body.classList.remove('viewer-fs-lock');
            mountViewerExitControl(false);
            viewer3D.classList.add('hidden');
            viewer3D.style.display = 'none';
        }

        // Same as opening / F5: restart loading with sound.
        // If sound was already playing, seek-to-start without pause (keeps unlock).
        function softReloadLikeFirstOpen(fromGesture) {
            if (softReloadInProgress) return;
            softReloadInProgress = true;
            try {
                if (mediaStopTimeout) {
                    clearTimeout(mediaStopTimeout);
                    mediaStopTimeout = null;
                }
                exitAnyNativeFullscreen();
                tearDownViewerForSoftReload();

                var hadSound = !!(soundUnmuted || sessionAudioOk()
                    || (loadingVideo && !loadingVideo.muted && !loadingVideo.paused)
                    || (loadingAudio && !loadingAudio.muted && !loadingAudio.paused));
                var activationLive = !!(navigator.userActivation && navigator.userActivation.isActive);
                var withGesture = !!(fromGesture || activationLive);

                mediaAlreadyStopped = false;
                autoUnmuteAttempts = 0;
                mediaBootStarted = false;
                mediaBootAt = 0;
                mediaBootPlaySettled = false;
                userHasGestured = withGesture;
                // Keep soundUnmuted true when restarting already-audible media
                if (!hadSound) soundUnmuted = false;

                loadingContainer.classList.remove('hidden', 'loading-fs-active');
                loadingContainer.style.display = '';

                function restartEl(el) {
                    if (!el) return false;
                    el.loop = (el === loadingVideo) ? false : el.loop;
                    el.volume = 1;
                    el.muted = false;
                    // Already playing unmuted → only seek (do not pause/play; that drops unlock)
                    if (hadSound && !el.paused) {
                        try { el.currentTime = 0; } catch (err) {}
                        return true;
                    }
                    try { el.pause(); } catch (err2) {}
                    try { el.currentTime = 0; } catch (err3) {}
                    return false;
                }

                var videoKept = restartEl(loadingVideo);
                var audioKept = restartEl(loadingAudio);
                if ((videoKept && useVideoAudio) || audioKept) {
                    soundUnmuted = true;
                    try { sessionStorage.setItem('kepu_audio_ok', '1'); } catch (err) {}
                    mediaBootStarted = true;
                    mediaBootAt = Date.now();
                    mediaBootPlaySettled = true;
                } else {
                    bootLoadingMedia(withGesture, hadSound);
                    if (withGesture) tryStartAudio(true);
                }
                checkVideoBuffer();
            } finally {
                setTimeout(function() { softReloadInProgress = false; }, 200);
            }
        }

        function scheduleAudioRetries() {
            bootLoadingMedia(false, sessionAudioOk());
        }

        function isReloadKey(e) {
            if (e.key === 'F5') return true;
            if ((e.key === 'r' || e.key === 'R') && (e.ctrlKey || e.metaKey) && !e.altKey) return true;
            return false;
        }

        var allowHardReload = false;

        // F5 / Ctrl+R: soft-reload with key gesture (sound stays on).
        // Ctrl+Shift+R stays a real hard reload (bypass cache).
        window.addEventListener('keydown', function(e) {
            if (!isReloadKey(e)) return;
            if (e.shiftKey) {
                allowHardReload = true;
                return;
            }
            e.preventDefault();
            softReloadLikeFirstOpen(true);
        }, true);

        // Toolbar reload (circular arrow): same soft-reload as F5, sync in this listener.
        if (typeof window.navigation !== 'undefined' && navigation.addEventListener) {
            navigation.addEventListener('navigate', function(e) {
                if (e.navigationType !== 'reload') return;
                if (!e.canIntercept) return;
                if (allowHardReload) {
                    allowHardReload = false;
                    return;
                }
                try {
                    e.intercept({
                        focusReset: 'manual',
                        scroll: 'manual',
                        handler: function() { return Promise.resolve(); }
                    });
                } catch (err) {
                    return;
                }
                // Sync unmuted play while the navigate event is still dispatching
                if (loadingVideo && (useVideoAudio || !loadingAudio)) {
                    loadingVideo.muted = false;
                    loadingVideo.play().catch(function() {});
                }
                if (loadingAudio) {
                    loadingAudio.muted = false;
                    loadingAudio.play().catch(function() {});
                }
                softReloadLikeFirstOpen(true);
            });
        }

        function startViewerLoad() {
            if (viewerLoadStarted || !viewer3D) return;
            viewerLoadStarted = true;
            var frame = document.getElementById('viewer3dFrame');
            if (frame && frame.getAttribute('data-src') && !frame.getAttribute('src')) {
                frame.src = frame.getAttribute('data-src');
                prefetchViewer(frame.getAttribute('data-src'));
            }
            if (projectData && projectData.viewer3D && projectData.viewer3D.charAt(0) === '<' && !viewer3D.querySelector('.viewer-embed-ready')) {
                var wrap = document.createElement('div');
                wrap.className = 'viewer-embed-ready';
                wrap.style.width = '100%';
                wrap.style.height = '100%';
                wrap.innerHTML = projectData.viewer3D;
                viewer3D.appendChild(wrap);
            }
        }

        function isVideoFullyBuffered(video) {
            if (!video) return false;
            var duration = video.duration;
            if (!duration || !isFinite(duration) || duration <= 0) return false;
            if (!video.buffered || video.buffered.length === 0) return false;
            for (var i = 0; i < video.buffered.length; i++) {
                var start = video.buffered.start(i);
                var end = video.buffered.end(i);
                if (start <= 0.35 && end >= (duration - 0.5)) {
                    return true;
                }
            }
            return false;
        }

        function onVideoFullyReady() {
            if (videoFullyReady) return;
            videoFullyReady = true;
            if (loadingVideo) {
                loadingVideo.loop = !loadingAudio;
            }
            if (!mediaAlreadyStopped) scheduleViewerLoadDeferred();
        }

        function scheduleViewerLoadDeferred() {
            if (mediaAlreadyStopped || viewerLoadStarted) return;
            function maybeLoad() {
                if (mediaAlreadyStopped || viewerLoadStarted) return;
                if (!loadingVideo) {
                    startViewerLoad();
                    return;
                }
                var t = loadingVideo.currentTime || 0;
                var d = loadingVideo.duration || 0;
                if (t >= 2.5 || (d > 0 && t >= Math.max(1, d - 10))) {
                    startViewerLoad();
                    return;
                }
                setTimeout(maybeLoad, 400);
            }
            maybeLoad();
        }

        function checkVideoBuffer() {
            if (videoFullyReady || mediaAlreadyStopped || !loadingVideo) return;
            if (isVideoFullyBuffered(loadingVideo)) {
                onVideoFullyReady();
            }
        }

        function exitAnyNativeFullscreen() {
            if (loadingVideo && loadingVideo.webkitDisplayingFullscreen
                && typeof loadingVideo.webkitExitFullscreen === 'function') {
                try { loadingVideo.webkitExitFullscreen(); } catch (err) {}
            }
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (!fsEl) return Promise.resolve();
            var exitFs = document.exitFullscreen || document.webkitExitFullscreen;
            if (!exitFs) return Promise.resolve();
            return Promise.resolve(exitFs.call(document)).catch(function() {});
        }

        function mountViewerExitControl(active) {
            var btn = document.getElementById('viewerFullscreenBtn');
            if (!btn || !viewer3D) return;
            if (active) {
                if (btn.parentElement !== document.body) {
                    document.body.appendChild(btn);
                }
                btn.classList.add('viewer-exit-floating');
                btn.style.display = 'inline-flex';
                btn.setAttribute('aria-hidden', 'false');
            } else {
                btn.classList.remove('viewer-exit-floating');
                btn.style.display = 'none';
                btn.setAttribute('aria-hidden', 'true');
                if (btn.parentElement !== viewer3D) {
                    viewer3D.appendChild(btn);
                }
            }
        }

        function applyViewerCssFullscreen() {
            if (!viewer3D) return;
            exitAnyNativeFullscreen().finally(function() {
                if (!viewer3D) return;
                viewer3D.classList.add('viewer-fs-active');
                document.documentElement.classList.add('viewer-fs-lock');
                document.body.classList.add('viewer-fs-lock');
                mountViewerExitControl(true);
                updateViewerFullscreenBtn();
            });
        }

        function isViewerFullscreen() {
            if (!viewer3D) return false;
            var fsEl = document.fullscreenElement || document.webkitFullscreenElement || null;
            if (fsEl === viewer3D) return true;
            return viewer3D.classList.contains('viewer-fs-active');
        }

        function updateViewerFullscreenBtn() {
            var btn = document.getElementById('viewerFullscreenBtn');
            if (!btn) return;
            if (isViewerFullscreen()) {
                mountViewerExitControl(true);
            } else {
                mountViewerExitControl(false);
            }
        }

        function exitViewerFullscreen() {
            if (!viewer3D) return;
            viewerWantsFullscreen = false;
            viewer3D.classList.remove('viewer-fs-active');
            document.documentElement.classList.remove('viewer-fs-lock');
            document.body.classList.remove('viewer-fs-lock');
            mountViewerExitControl(false);
            exitAnyNativeFullscreen().finally(function() {
                updateViewerFullscreenBtn();
            });
            updateViewerFullscreenBtn();
        }

        function enterViewerFullscreen() {
            if (!viewer3D) return;
            applyViewerCssFullscreen();
        }

        function showViewer() {
            if (mediaAlreadyStopped) return;
            mediaAlreadyStopped = true;
            startViewerLoad();
            if (mediaStopTimeout) {
                clearTimeout(mediaStopTimeout);
                mediaStopTimeout = null;
            }
            var keepViewerFullscreen = (typeof isLoadingFullscreen === 'function')
                ? isLoadingFullscreen()
                : !!(loadingContainer && loadingContainer.classList.contains('loading-fs-active'));

            loadingContainer.classList.remove('loading-fs-active');

            if (loadingAudio) {
                loadingAudio.pause();
                loadingAudio.currentTime = 0;
            }
            if (loadingVideo) {
                loadingVideo.pause();
                loadingVideo.currentTime = 0;
            }
            loadingContainer.style.display = 'none';
            loadingContainer.classList.add('hidden');
            viewer3D.style.display = 'block';
            viewer3D.classList.remove('hidden');

            if (keepViewerFullscreen) {
                viewerWantsFullscreen = true;
                enterViewerFullscreen();
                setTimeout(function() { if (viewerWantsFullscreen) { enterViewerFullscreen(); updateViewerFullscreenBtn(); } }, 100);
                setTimeout(function() { if (viewerWantsFullscreen) { enterViewerFullscreen(); updateViewerFullscreenBtn(); } }, 400);
                setTimeout(function() { if (viewerWantsFullscreen) updateViewerFullscreenBtn(); }, 800);
            } else {
                viewerWantsFullscreen = false;
                exitAnyNativeFullscreen();
                mountViewerExitControl(false);
            }
        }

        viewer3D.style.display = 'none';
        loadingContainer.style.cursor = 'pointer';
        loadingContainer.title = '3D მოდელის ნახვისთვის დააჭირეთ';

        function getNativeFullscreenEl() {
            return document.fullscreenElement || document.webkitFullscreenElement || null;
        }

        function isLoadingFullscreen() {
            var fsEl = getNativeFullscreenEl();
            if (fsEl === loadingContainer || (loadingVideo && fsEl === loadingVideo)) return true;
            if (loadingVideo && loadingVideo.webkitDisplayingFullscreen) return true;
            return loadingContainer.classList.contains('loading-fs-active');
        }

        function updateFullscreenBtn() {
            var btn = document.getElementById('loadingFullscreenBtn');
            if (!btn) return;
            btn.style.display = 'inline-flex';
            btn.disabled = false;
            var icon = btn.querySelector('i');
            if (!icon) return;
            if (isLoadingFullscreen()) {
                icon.className = 'bi bi-fullscreen-exit';
                btn.title = 'სრული ეკრანიდან გასვლა';
                btn.setAttribute('aria-label', 'სრული ეკრანიდან გასვლა');
            } else {
                icon.className = 'bi bi-arrows-fullscreen';
                btn.title = 'სრული ეკრანი';
                btn.setAttribute('aria-label', 'სრული ეკრანი');
            }
        }

        function enterLoadingFullscreen() {
            if (loadingVideo && typeof loadingVideo.webkitEnterFullscreen === 'function') {
                try {
                    loadingVideo.webkitEnterFullscreen();
                    updateFullscreenBtn();
                    return;
                } catch (err) {}
            }
            var target = loadingContainer;
            var req = loadingContainer.requestFullscreen || loadingContainer.webkitRequestFullscreen;
            if (req) {
                Promise.resolve(req.call(target)).then(function() {
                    updateFullscreenBtn();
                }).catch(function() {
                    loadingContainer.classList.add('loading-fs-active');
                    updateFullscreenBtn();
                });
                return;
            }
            loadingContainer.classList.add('loading-fs-active');
            updateFullscreenBtn();
        }

        function exitLoadingFullscreen() {
            if (loadingVideo && loadingVideo.webkitDisplayingFullscreen && typeof loadingVideo.webkitExitFullscreen === 'function') {
                try { loadingVideo.webkitExitFullscreen(); } catch (err) {}
            }
            var fsEl = getNativeFullscreenEl();
            if (fsEl) {
                var exitFs = document.exitFullscreen || document.webkitExitFullscreen;
                if (exitFs) {
                    Promise.resolve(exitFs.call(document)).catch(function() {});
                }
            }
            loadingContainer.classList.remove('loading-fs-active');
            updateFullscreenBtn();
        }

        function toggleLoadingFullscreen(e) {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            if (loadingContainer._fsToggleLock) return;
            loadingContainer._fsToggleLock = true;
            setTimeout(function() { loadingContainer._fsToggleLock = false; }, 450);
            noteUserGesture();
            if (isLoadingFullscreen()) {
                exitLoadingFullscreen();
            } else {
                enterLoadingFullscreen();
            }
            setTimeout(updateFullscreenBtn, 50);
            setTimeout(updateFullscreenBtn, 300);
        }

        function syncFullscreenAfterOrientation() {
            var fsEl = getNativeFullscreenEl();
            var nativeOnVideo = !!(loadingVideo && loadingVideo.webkitDisplayingFullscreen);
            if (!fsEl && !nativeOnVideo && loadingContainer.classList.contains('loading-fs-active')) {
                updateFullscreenBtn();
                return;
            }
            if (!fsEl && !nativeOnVideo) {
                loadingContainer.classList.remove('loading-fs-active');
            }
            updateFullscreenBtn();
        }

        var fullscreenBtn = document.getElementById('loadingFullscreenBtn');
        if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', toggleLoadingFullscreen);
            fullscreenBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                toggleLoadingFullscreen(e);
            }, { passive: false });
        }
        var viewerFullscreenBtn = document.getElementById('viewerFullscreenBtn');
        if (viewerFullscreenBtn) {
            var viewerExitTapLock = false;
            function onViewerExitTap(e) {
                e.preventDefault();
                e.stopPropagation();
                if (viewerExitTapLock) return;
                viewerExitTapLock = true;
                setTimeout(function() { viewerExitTapLock = false; }, 450);
                exitViewerFullscreen();
            }
            viewerFullscreenBtn.addEventListener('click', onViewerExitTap);
            viewerFullscreenBtn.addEventListener('touchend', onViewerExitTap, { passive: false });
        }
        document.addEventListener('fullscreenchange', function() {
            updateFullscreenBtn();
            updateViewerFullscreenBtn();
        });
        document.addEventListener('webkitfullscreenchange', function() {
            updateFullscreenBtn();
            updateViewerFullscreenBtn();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && viewer3D && viewer3D.classList.contains('viewer-fs-active')) {
                exitViewerFullscreen();
            }
        });
        if (loadingVideo) {
            loadingVideo.addEventListener('webkitbeginfullscreen', updateFullscreenBtn);
            loadingVideo.addEventListener('webkitendfullscreen', function() {
                loadingContainer.classList.remove('loading-fs-active');
                updateFullscreenBtn();
                if (viewerWantsFullscreen && mediaAlreadyStopped) {
                    setTimeout(function() {
                        if (viewerWantsFullscreen) enterViewerFullscreen();
                    }, 50);
                    setTimeout(function() {
                        if (viewerWantsFullscreen) enterViewerFullscreen();
                    }, 350);
                }
            });
        }
        window.addEventListener('orientationchange', function() {
            setTimeout(syncFullscreenAfterOrientation, 250);
            setTimeout(syncFullscreenAfterOrientation, 700);
        });
        window.addEventListener('resize', function() {
            setTimeout(syncFullscreenAfterOrientation, 150);
        });

        loadingContainer.addEventListener('click', function(e) {
            if (e.target.closest && e.target.closest('#loadingFullscreenBtn')) return;
            noteUserGesture();
            startViewerLoad();
            showViewer();
        });

        document.addEventListener('click', noteUserGesture);
        document.addEventListener('touchstart', function(e) {
            if (document.body.classList.contains('glightbox-open')) return;
            noteUserGesture();
        }, { passive: true });
        document.addEventListener('keydown', noteUserGesture);

        if (loadingAudio) {
            loadingAudio.addEventListener('canplay', function() { tryStartAudio(false); });
            loadingAudio.addEventListener('loadeddata', function() { tryStartAudio(false); });
        }
        if (loadingVideo) {
            loadingVideo.addEventListener('pause', function() {
                if (mediaAlreadyStopped || soundUnmuted) return;
                if (mediaBootAt && (Date.now() - mediaBootAt) < 3000) return;
                setTimeout(function() {
                    if (mediaAlreadyStopped || soundUnmuted || !loadingVideo.paused) return;
                    ensurePlayingMuted(loadingVideo);
                }, 60);
            });
            if (useVideoAudio || loadingAudio) {
                loadingVideo.addEventListener('canplay', function() { tryStartAudio(false); });
                loadingVideo.addEventListener('loadeddata', function() { tryStartAudio(false); });
            }
            loadingVideo.addEventListener('progress', checkVideoBuffer);
            loadingVideo.addEventListener('loadeddata', checkVideoBuffer);
            loadingVideo.addEventListener('timeupdate', checkVideoBuffer);
            checkVideoBuffer();
            loadingVideo.addEventListener('playing', function() {
                if (!soundUnmuted) tryStartAudio(false);
            });
        } else {
            setTimeout(startViewerLoad, 800);
        }
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) {
                softReloadLikeFirstOpen(false);
            }
        });

        scheduleAudioRetries();

        if (loadingVideo) {
            loadingVideo.loop = false;
            loadingVideo.addEventListener('ended', function() {
                if (mediaAlreadyStopped) return;
                if (loadingAudio && !loadingAudio.ended) {
                    loadingVideo.currentTime = 0;
                    loadingVideo.play().catch(function() {});
                    return;
                }
                // Reaching the end once usually means the file is fully buffered
                onVideoFullyReady();
                if (viewerLoadStarted) {
                    showViewer();
                } else {
                    loadingVideo.currentTime = 0;
                    loadingVideo.play().catch(function() {});
                }
            });
        }

        if (loadingAudio) {
            loadingAudio.loop = false;
            loadingAudio.addEventListener('ended', showViewer);
        }

        mediaStopTimeout = setTimeout(showViewer, MAX_WAIT_MS);
    }

    function initProjectMap(p) {
        try {
            var lat = parseFloat(p.latitude);
            var lng = parseFloat(p.longitude);
            if (isNaN(lat) || isNaN(lng)) return;

            var map = L.map('map').setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup('<b>' + p.title + '</b>').openPopup();
        } catch (e) { console.error('Map error:', e); }
    }

    var currentProject = null;

    // ===== FIND PROJECT BY ID =====
    var urlParams = new URLSearchParams(window.location.search);
    var projectId = urlParams.get('id');
    var project = projectsData.find(function(p) { return p.id === projectId; });

    if (!project) {
        document.getElementById('projectPage').innerHTML = '<div class="text-center py-5"><h2>' + SiteI18n.t('project.not_found') + '</h2><a href="index.html" class="btn btn-primary mt-3">' + SiteI18n.t('project.back_home') + '</a></div>';
    } else {
        currentProject = project;
        document.title = SiteI18n.localizedField(project, 'title') + ' - Georgian Heritage Portfolio';
        try {
            renderProject(project);
        } catch (e) {
            console.error('Project render error:', e);
            document.getElementById('projectPage').innerHTML = '<div class="alert alert-danger"><a href="index.html">' + SiteI18n.t('project.back_home') + '</a></div>';
        }
    }

    window.addEventListener('sitelangchange', function() {
        if (currentProject) {
            document.title = SiteI18n.localizedField(currentProject, 'title') + ' - Georgian Heritage Portfolio';
            try { renderProject(currentProject); } catch (e) { console.error(e); }
        }
    });

    // ===== MOBILE MENU =====
    var mobileMenuBtn = document.getElementById('mobileMenuBtn');
    var mainNav = document.getElementById('mainNav');
    function checkScreenSize() { if (window.innerWidth > 991) mainNav.classList.remove('mobile-menu-open'); }
    mobileMenuBtn.addEventListener('click', function() { mainNav.classList.toggle('mobile-menu-open'); });
    document.querySelectorAll('#mainNav a').forEach(function(link) {
        link.addEventListener('click', function() { mainNav.classList.remove('mobile-menu-open'); });
    });
    checkScreenSize();
    window.addEventListener('resize', checkScreenSize);
    </script>
</body>
