        "description": "\u10d3\u10d8\u10d3\u10d8 \u10e1\u10d0\u10db\u10d0\u10db\u10e3\u10da\u10dd \u10dd\u10db\u10e8\u10d8 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10d5\u10d4\u10d1\u10d8\u10e1 \u10e5\u10d0\u10dc\u10d3\u10d0\u10d9\u10d4\u10d1\u10d0, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10dd\u10d1\u10e1 \u10d7\u10d1\u10d8\u10da\u10d8\u10e1\u10e8\u10d8, \u10d5\u10d0\u10d9\u10d8\u10e1 \u10de\u10d0\u10e0\u10d9\u10e8\u10d8, \u10d0\u10e0\u10d8\u10e1 \u10db\u10dd\u10dc\u10e3\u10db\u10d4\u10dc\u10e2\u10e3\u10e0\u10d8 \u10eb\u10d4\u10d2\u10da\u10d8, \u10e0\u10dd\u10db\u10d4\u10da\u10d8\u10ea \u10d3\u10d0\u10d8\u10d3\u10d2\u10d0 1981 \u10ec\u10d4\u10da\u10e1. 28 \u10db\u10d4\u10e2\u10e0\u10d8\u10e1 \u10e1\u10d8\u10db\u10d0\u10e6\u10da\u10d8\u10d7 \u10e5\u10d0\u10dc\u10d3\u10d0\u10d9\u10d4\u10d1\u10d0 \u10d0\u10e1\u10d0\u10ee\u10d0\u10d5\u10e1 \u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10db\u10e8\u10dd\u10d1\u10da\u10dd\u10e1 \u10d2\u10d0\u10db\u10dd\u10e1\u10d0\u10ee\u10e3\u10da\u10d4\u10d1\u10d0\u10e1.",
        "latitude": "41.706472556197404", "longitude": "44.751548578684634",
        "other_images": [], "model_urls": [],
        "project_info": {"\u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0": "\u10d5\u10d0\u10d9\u10d8\u10e1 \u10de\u10d0\u10e0\u10d9\u10d8", "\u10e1\u10d8\u10db\u10d0\u10e6\u10da\u10d4": "28 \u10db\u10d4\u10e2\u10e0\u10d8", "\u10d0\u10e1\u10d0\u10ee\u10d0\u10d5\u10e1": "\u10d2\u10d0\u10db\u10d0\u10e0\u10ef\u10d5\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e1\u10d0\u10db\u10e8\u10dd\u10d1\u10da\u10dd\u10e1 \u10d2\u10d0\u10db\u10dd\u10e1\u10d0\u10ee\u10e3\u10da\u10d4\u10d1\u10d0\u10e1"},
        "loading_video": "", "loading_audio": ""
      }
    ];

    // ===== FIND PROJECT BY ID =====
    var urlParams = new URLSearchParams(window.location.search);
    var projectId = urlParams.get('id');
    var project = allProjects.find(function(p) { return p.id === projectId; });

    if (!project) {
        document.getElementById('projectPage').innerHTML = '<div class="text-center py-5"><h2>\u10de\u10e0\u10dd\u10d4\u10e5\u10e2\u10d8 \u10d5\u10d4\u10e0 \u10db\u10dd\u10d8\u10eb\u10d4\u10d1\u10dc\u10d0</h2><a href="index.html" class="btn btn-primary mt-3">\u10db\u10d7\u10d0\u10d5\u10d0\u10e0 \u10d2\u10d5\u10d4\u10e0\u10d3\u10d6\u10d4</a></div>';
    } else {
        document.title = project.title + ' - Georgian Heritage Portfolio';
        renderProject(project);
    }

    function renderProject(p) {
        var html = '';
        
        // Title
        html += '<h1 class="project-title">' + p.title + '</h1>';
        
        // 3D Viewer
        if (p.viewer3D) {
            html += '<div class="viewer-wrap">';
            html += '<div id="loadingContainer" class="loading-container">';
            
            if (p.loading_video && p.loading_video !== '' && p.loading_video !== 'None') {
                html += '<video id="loadingVideo" class="loading-video" autoplay muted loop><source src="' + p.loading_video + '" type="video/mp4"></video>';
            }
            
            html += '<div class="loading-overlay">';
            html += '<div class="loading-text" id="loadingText">3D \u10db\u10dd\u10d3\u10d4\u10da\u10d8 \u10d8\u10e2\u10d5\u10d8\u10e0\u10d7\u10d4\u10d1\u10d0...</div>';
            html += '<div class="loading-spinner"></div>';
            html += '<div style="margin-top:15px;font-size:0.9rem;opacity:0.8;" id="loadingStatus">\u10db\u10dd\u10d3\u10d4\u10da\u10d8 \u10d8\u10e2\u10d5\u10d8\u10e0\u10d7\u10d4\u10d1\u10d0...</div>';
            html += '<div style="margin-top:20px;font-size:0.8rem;opacity:0.7;color:#fff;">\ud83d\udca1 3D \u10db\u10dd\u10d3\u10d4\u10da\u10d8\u10e1 \u10dc\u10d0\u10ee\u10d5\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d3\u10d0\u10d0\u10ed\u10d8\u10e0\u10d4\u10d7 \u10d4\u10d9\u10e0\u10d0\u10dc\u10d6\u10d4 \u10d0\u10dc \u10db\u10dd\u10d8\u10ea\u10d0\u10d3\u10d4\u10d7 30 \u10ec\u10d0\u10db\u10d8</div>';
            html += '</div></div>';
            
            html += '<div id="viewer3D" class="hidden">';
            if (p.viewer3D.charAt(0) === '<') {
                html += p.viewer3D;
            } else {
                html += '<iframe src="' + p.viewer3D + '" class="viewer-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="xr-spatial-tracking; gyroscope; accelerometer"></iframe>';
            }
            html += '</div></div>';
        }
        
        // Map
        if (p.latitude && p.longitude) {
            html += '<h4>\u10d0\u10d3\u10d2\u10d8\u10da\u10db\u10d3\u10d4\u10d1\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0 \u10e0\u10e3\u10d9\u10d0\u10d6\u10d4</h4>';
            html += '<div id="map" style="height:350px; margin-bottom:20px;"></div>';
        }
        
        // Description + Info
        html += '<div class="row" id="projectContent">';
        html += '<div class="col-md-8" id="descriptionCol"><h4>\u10d0\u10e6\u10ec\u10d4\u10e0\u10d0</h4>';
        html += '<div class="project-description">' + (p.description || '') + '</div></div>';
        
        html += '<div class="col-md-4" id="infoCol"><div class="card"><div class="card-header"><h5>\u10de\u10e0\u10dd\u10d4\u10e5\u10e2\u10d8\u10e1 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0</h5></div><div class="card-body">';
        if (p.project_info && Object.keys(p.project_info).length > 0) {
            for (var key in p.project_info) {
                if (p.project_info[key]) {
                    html += '<p><strong>' + key + ':</strong> ' + p.project_info[key] + '</p>';
                }
            }
        } else {
            html += '<p class="text-muted">\u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d0 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1 \u10db\u10d8\u10d7\u10d8\u10d7\u10d4\u10d1\u10e3\u10da\u10d8</p>';
        }
        html += '</div></div></div></div>';
        
        // Images
        var hasImages = p.main_image || (p.other_images && p.other_images.length > 0);
        if (hasImages) {
            html += '<h4>\u10e1\u10e3\u10e0\u10d0\u10d7\u10d4\u10d1\u10d8</h4><div class="row">';
            if (p.main_image) {
                var caption = p.main_image_caption || '\u10db\u10d7\u10d0\u10d5\u10d0\u10e0\u10d8 \u10e1\u10e3\u10e0\u10d0\u10d7\u10d8';
                html += '<div class="col-md-3 mb-2"><a href="' + p.main_image + '" class="glightbox" data-gallery="gallery1" data-title="' + caption + '"><img src="' + p.main_image + '" class="img-thumbnail" alt="' + caption + '"></a><div class="text-center small text-muted mt-1">' + caption + '</div></div>';
            }
            if (p.other_images) {
                p.other_images.forEach(function(img) {
                    if (img.url) {
                        html += '<div class="col-md-3 mb-2"><a href="' + img.url + '" class="glightbox" data-gallery="gallery1" data-title="' + (img.caption || '') + '"><img src="' + img.url + '" class="img-thumbnail" alt="\u10e1\u10e3\u10e0\u10d0\u10d7\u10d8"></a><div class="text-center small text-muted mt-1">' + (img.caption || '') + '</div></div>';
                    }
                });
            }
            html += '</div>';
        }
        
        document.getElementById('projectPage').innerHTML = html;
        
        // Initialize GLightbox
        if (typeof GLightbox !== 'undefined') {
            GLightbox({ selector: '.glightbox' });
        }
        
        // Initialize 3D viewer loading
        if (p.viewer3D) {
            initViewer();
        }
        
        // Initialize map
        if (p.latitude && p.longitude) {
            initProjectMap(p);
        }
    }

    function initViewer() {
        var loadingContainer = document.getElementById('loadingContainer');
        var viewer3D = document.getElementById('viewer3D');
        if (!loadingContainer || !viewer3D) return;
        
        function showViewer() {
            loadingContainer.classList.add('hidden');
            viewer3D.classList.remove('hidden');
            var video = document.getElementById('loadingVideo');
            if (video) video.pause();
            var audio = document.getElementById('loadingAudio');
            if (audio) audio.pause();
        }
        
        loadingContainer.addEventListener('click', showViewer);
        setTimeout(showViewer, 30000);
    }

    function initProjectMap(p) {
        try {
            var lat = parseFloat(p.latitude);
            var lng = parseFloat(p.longitude);
            if (isNaN(lat) || isNaN(lng)) return;
            
            var map = L.map('map').setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            L.marker([lat, lng]).addTo(map).bindPopup('<b>' + p.title + '</b>').openPopup();
        } catch (e) { console.error('Map error:', e); }
    }

    // ===== MOBILE MENU =====
    var mobileMenuBtn = document.getElementById('mobileMenuBtn');
    var mainNav = document.getElementById('mainNav');
    function checkScreenSize() { if (window.innerWidth > 991) mainNav.classList.remove('mobile-menu-open'); }
    mobileMenuBtn.addEventListener('click', function() { mainNav.classList.toggle('mobile-menu-open'); });
    document.querySelectorAll('#mainNav a').forEach(function(link) {
        link.addEventListener('click', function() { mainNav.classList.remove('mobile-menu-open'); });
    });
    checkScreenSize();
    window.addEventListener('resize', checkScreenSize);
    </script>
